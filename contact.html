<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — Byela</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">Byela</a>
    <ul class="nav-links">
      <li><a href="about.html">About</a></li>
      <li><a href="work.html">Work</a></li>
      <li><a href="resume.html">Resume</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <div class="page">
    <div class="contact-grid">
      <div class="contact-left">
        <h2>Let's make<br>something <em>bold.</em></h2>
        <p>Open to commissions, collaborations, and creative projects. Don't be shy.</p>
        <div class="contact-links">
          <a class="contact-link" href="mailto:hello@byela.com">
            <span class="contact-link-icon">✉</span>
            hello@byela.com
          </a>
          <a class="contact-link" href="https://www.instagram.com/byelacrispin/">
            <span class="contact-link-icon">📷</span>
            @byelacrispin on Instagram
          </a>
          <a class="contact-link" href="https://github.com/Byela-2">
            <span class="contact-link-icon">⌥</span>
            Byela-2 on GitHub
          </a>
        </div>
      </div>
      <div class="contact-right">
        <h3>Send a message</h3>
        <div class="form-group">
          <label>Your name</label>
          <input type="text" placeholder="Jane Smith"/>
        </div>
        <div class="form-group">
          <label>Email address</label>
          <input type="email" placeholder="jane@example.com"/>
        </div>
        <div class="form-group">
          <label>Message</label>
          <textarea placeholder="Tell me about your project..."></textarea>
        </div>
        <button class="form-submit">Send message</button>
      </div>
    </div>
  </div>

  <footer>
    <span>© 2024 Byela. All rights reserved.</span>
    <span>Made with intention.</span>
  </footer>

</body>
</html>
